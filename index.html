<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ফাইল কই!</title>
<link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  --primary: #8b5cf6;
  --primary-hover: #7c3aed;
  --danger: #ef4444;
  --glass: rgba(30, 20, 50, 0.55);
  --glass-card: rgba(40, 25, 70, 0.4);
  --border: rgba(139, 92, 246, 0.3);
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: 'Montserrat', sans-serif;
  background: var(--bg-gradient);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
}

header, footer {
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  background: rgba(15, 10, 30, 0.6);
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
}
footer { border-bottom: none; border-top: 1px solid var(--border); text-align: center; margin-top: auto; font-size: 0.9rem;}

.header-wrap { max-width: 1400px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: "Anek Bangla", sans-serif; font-size: 34px; font-weight: 700; }
.logo span { color: #c084fc; }

.container { max-width: 1400px; margin: auto; width: 100%; padding: 30px; flex: 1; }

.panel {
  background: var(--glass);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: var(--shadow);
  padding: 25px;
  margin-bottom: 30px;
}

.form-grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
  gap: 15px; 
  margin-bottom: 15px;
}

input, select { 
  padding: 12px 16px; 
  border: 1px solid rgba(139, 92, 246, 0.4); 
  border-radius: 12px; 
  background: rgba(15, 10, 30, 0.6);
  font-family: 'Montserrat', sans-serif;
  color: #fff;
  outline: none;
}
input::placeholder { color: #64748b; }
input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3); }

.btn { 
  padding: 12px 24px; 
  border: none; 
  border-radius: 12px; 
  color: #fff; 
  cursor: pointer; 
  font-weight: 600; 
  transition: all 0.3s ease; 
  font-family: 'Montserrat', sans-serif;
}
.btn-primary { background: var(--primary); }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }

.grid { 
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
  gap: 25px; 
}

.card {
  background: var(--glass-card);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: 0.3s ease;
  display: flex;
  flex-direction: column;
}
.card:hover { transform: translateY(-5px); border-color: var(--primary); }

.thumbnail {
  width: 100%;
  aspect-ratio: 16 / 9;
  background-color: #1e1b4b;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4rem;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.3);
}

.card-content { padding: 20px; flex: 1; display: flex; flex-direction: column; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;}
.card-title { font-size: 1.1rem; font-weight: 600; color: #fff;}
.card-tag { font-size: 0.75rem; background: var(--primary); padding: 3px 8px; border-radius: 12px; color: #fff;}

.card-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; flex: 1;}
.card-meta { font-size: 0.8rem; color: #64748b; margin-bottom: 15px; border-top: 1px solid var(--border); padding-top: 10px;}

.card-actions { display: flex; gap: 10px; }
.btn-action { 
  flex: 1; padding: 10px; text-align: center; border-radius: 8px; 
  text-decoration: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none;
}
.btn-open { background: var(--primary); color: #fff; }
.btn-del { background: transparent; border: 1px solid var(--danger); color: var(--danger); flex: 0.3;}

.status-msg { grid-column: 1 / -1; text-align: center; padding: 40px; font-size: 1.2rem; background: var(--glass); border-radius: 16px; border: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="header-wrap">
    <div class="logo">📁 ফাইল <span>কই!</span></div>
  </div>
</header>

<main class="container">
  
  <div class="panel">
    <div class="form-grid">
      <input type="text" id="fileTitle" placeholder="File Title (e.g. Physics Chapter 3)">
      <input type="url" id="fileLink" placeholder="Download/View Link (Required)">
      <input type="url" id="fileThumb" placeholder="Thumbnail Image URL (Optional)">
      <input type="text" id="uploaderName" value="Md Sifatul Islam" placeholder="Your Name">
      <select id="fileCategory">
        <option value="Presentation">Presentation / Slides</option>
        <option value="Docs">Docs / Notes</option>
        <option value="Figure">Figure / Illustration</option>
        <option value="Data">Data / Sheet</option>
        <option value="Code">Code / Script</option>
        <option value="Other">Other</option>
      </select>
    </div>
    
    <div style="display: flex; gap: 15px;">
      <input type="text" id="fileDesc" placeholder="Short description..." style="flex: 1;">
      <button class="btn btn-primary" id="saveBtn" onclick="addFile()">+ Add File</button>
    </div>
  </div>

  <div class="grid" id="fileGrid">
    <div class="status-msg">Loading files from database...</div>
  </div>

</main>

<footer>© 2026 <span style="font-family:'Anek Bangla', sans-serif;">ফাইল কই!</span> • Md Sifatul Islam</footer>

<script>
// IMPORTANT: Replace with your new Google Apps Script URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwL3dYf9c9j5CWhma8s3Gip3gsN98uLxpSBps5yCjY6FSEl_VmaWS245OKVjHjRU2_4/exec"; 

async function loadData() {
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        renderGrid(data);
    } catch (e) {
        document.getElementById('fileGrid').innerHTML = `<div class="status-msg" style="color:#fca5a5;">Database connection error.</div>`;
    }
}

function renderGrid(data) {
    const grid = document.getElementById('fileGrid');
    grid.innerHTML = '';

    if(data.length === 0) {
        grid.innerHTML = `<div class="status-msg">No files found. Add one above!</div>`;
        return;
    }

    // Sort by newest first
    data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

    data.forEach(file => {
        const dateObj = new Date(file.timestamp);
        const timeString = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const dateString = dateObj.toLocaleDateString();

        // Thumbnail logic
        let thumbStyle = file.thumb && file.thumb.trim() !== '' ? `background-image: url('${file.thumb}')` : '';
        let fallbackTxt = file.thumb && file.thumb.trim() !== '' ? '' : file.title.charAt(0);

        let html = `
            <div class="card">
                <div class="thumbnail" style="${thumbStyle}">
                    ${fallbackTxt}
                </div>
                <div class="card-content">
                    <div class="card-header">
                        <div class="card-title">${file.title}</div>
                        <div class="card-tag">${file.tag}</div>
                    </div>
                    <div class="card-desc">${file.desc || 'No description provided.'}</div>
                    
                    <div class="card-meta">
                        <div><strong>Added By:</strong> ${file.uploader || 'Anonymous'}</div>
                        <div><strong>Time:</strong> ${dateString} at ${timeString}</div>
                    </div>
                    
                    <div class="card-actions">
                        <a href="${file.link}" target="_blank" class="btn-action btn-open">Open File</a>
                        <button class="btn-action btn-del" onclick="deleteFile('${file.id}')">Delete</button>
                    </div>
                </div>
            </div>
        `;
        grid.innerHTML += html;
    });
}

async function addFile() {
    const title = document.getElementById('fileTitle').value.trim();
    const link = document.getElementById('fileLink').value.trim();
    
    if (!title || !link) { alert("Title and Link are required."); return; }
    
    const pass = prompt('Enter Admin Password:');
    if (!pass) return;

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.innerText = "Saving...";

    const payload = {
        action: 'add',
        password: pass,
        id: Date.now().toString(),
        title: title,
        link: link,
        thumb: document.getElementById('fileThumb').value.trim(),
        uploader: document.getElementById('uploaderName').value,
        tag: document.getElementById('fileCategory').value,
        desc: document.getElementById('fileDesc').value,
        timestamp: new Date().toISOString()
    };

    try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json();
        if (result.success) {
            // Reset fields except uploader name
            document.getElementById('fileTitle').value = '';
            document.getElementById('fileLink').value = '';
            document.getElementById('fileThumb').value = '';
            document.getElementById('fileDesc').value = '';
            await loadData();
        } else alert('Error: ' + result.error);
    } catch (e) { alert('Network error.'); }
    finally { btn.disabled = false; btn.innerText = "+ Add File"; }
}

async function deleteFile(id) {
    const pass = prompt('Enter Admin Password to delete:');
    if (!pass) return;

    const payload = { action: 'delete', password: pass, id: id };
    try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json();
        if (result.success) await loadData();
        else alert('Error: ' + result.error);
    } catch (e) { alert('Network error.'); }
}

window.onload = loadData;
</script>
</body>
</html>
